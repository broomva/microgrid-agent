name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust kernel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: kernel
      - name: Check
        run: cd kernel && cargo check
      - name: Test
        run: cd kernel && cargo test
      - name: Clippy (warn, not error — kernel has known TODOs)
        run: cd kernel && cargo clippy 2>&1 | tail -5

  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: reference/pyproject.toml
      - name: Install
        run: cd reference && pip install -e ".[dev]"
      - name: Test
        run: cd reference && pytest tests/ -v --tb=short
      - name: Lint (active code only — reference/ is frozen)
        run: ruff check forecast/ simulation/

  simulation:
    name: Simulation benchmark
    runs-on: ubuntu-latest
    needs: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: reference/pyproject.toml
      - name: Install
        run: cd reference && pip install -e ".[dev]"
      - name: Run simulation (Coqui)
        run: python -m simulation.run --site coqui

  control-audit:
    name: Control audit
    runs-on: ubuntu-latest
    needs: [rust, python]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: kernel
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: reference/pyproject.toml
      - name: Install Python deps
        run: cd reference && pip install -e ".[dev]"
      - name: Run control audit
        run: bash scripts/control/control-audit.sh
